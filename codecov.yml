# Codecov coverage gating. Flips from advisory (M01 commit c04aac5)
# to required (M02 Stage A). Project + patch checks both blocking.
# Absolute thresholds (cargo llvm-cov --fail-under-lines) remain
# authoritative for hard floors; Codecov gates the *delta* vs main.

coverage:
  status:
    project:
      default:
        target:        auto
        threshold:     0.5%
        base:          auto
        if_no_uploads: error
        informational: false
      runtime-drone:
        target:    95%
        threshold: 0.5%
        flags:     [runtime-drone]
        informational: false
      runtime-main:
        target:    95%
        threshold: 0.5%
        flags:     [runtime-main]
        informational: false
      runtime-sandbox:
        # New safety primitive — M05 Stage C1. Gate covers the plumbing
        # files (validator + protocol + error). ipc.rs is excluded as a
        # cfg-platform OS-call wrapper holdout; Stage C2 will lift the
        # gate once OS-isolation files extend the test surface.
        target:    95%
        threshold: 0.5%
        flags:     [runtime-sandbox]
        informational: false
    patch:
      # Default patch gate — applies to everything EXCEPT src-tauri/** which
      # has its own gate below. The exclusion keeps Tauri-shell wrappers
      # (which call real OS APIs and can't be unit-tested on CI without a
      # platform keychain / Tauri AppHandle) from blocking PRs that also
      # touch the testable code in crates/*.
      default:
        target:        80%
        threshold:     0%
        informational: false
        paths:
          - "!src-tauri/**"
      # Tauri shell — wrappers over OS calls (keyring writes, AppHandle
      # event emission, AnthropicProvider construction). The testable
      # seams (`set_api_key_with`, `run_smoke_session_with`) are unit-
      # tested and pull this number up; the wrappers never will be without
      # integration tests against a real keychain. 50% reflects the
      # seam-vs-wrapper split honestly. Per CLAUDE.md §5 / docs/style.md
      # `*_with` archetype + the M02.E exclusion-list pattern (anthropic.rs,
      # key_store.rs, drone_ipc/connection.rs all excluded from the
      # runtime-main 95% gate for the same reason).
      tauri-shell:
        target:        50%
        threshold:     0%
        informational: false
        paths:
          - "src-tauri/**"

comment:
  layout:           "reach, diff, flags, files"
  behavior:         default
  require_changes:  true
  require_base:     true
  require_head:     true

ignore:
  - "**/generated/**"
  - "**/src/main.rs"
  - "**/build.rs"
  - "src-tauri/gen/**"
  # M05 Stage C2 runtime-sandbox holdouts: lib.rs (OS-signal
  # orchestrator wrapping run_inner; parallel to drone's lib.rs).
  # ipc.rs is now in the gate (Stage C1 carry-forward lifted at C2).
  # The cfg-platform OS-isolation files (seccomp.rs / landlock.rs on
  # Linux; job_objects.rs on Windows) build only on their respective
  # platform; their line coverage is attributed by the CI matrix.
  - "crates/runtime-sandbox/src/lib.rs"
