[graph]
all-features = true

[advisories]
db-urls    = ["https://github.com/rustsec/advisory-db"]
yanked     = "deny"
# Tauri's GTK3 transitive deps are unmaintained (Linux-only, not used on Windows v0.1).
# glib unsoundness advisory is in VariantStrIter which we don't call.
ignore     = [
    "RUSTSEC-2024-0370",  # proc-macro-error unmaintained (via gtk3-macros)
    "RUSTSEC-2024-0411",  # gdkwayland-sys unmaintained
    "RUSTSEC-2024-0412",  # gdk unmaintained
    "RUSTSEC-2024-0413",  # atk unmaintained
    "RUSTSEC-2024-0414",  # gdkx11-sys unmaintained
    "RUSTSEC-2024-0415",  # gtk unmaintained
    "RUSTSEC-2024-0416",  # atk-sys unmaintained
    "RUSTSEC-2024-0417",  # gdkx11 unmaintained
    "RUSTSEC-2024-0418",  # gdk-sys unmaintained
    "RUSTSEC-2024-0419",  # gtk3-macros unmaintained
    "RUSTSEC-2024-0420",  # gtk-sys unmaintained
    "RUSTSEC-2024-0429",  # glib unsoundness in VariantStrIter (we don't call it)
    "RUSTSEC-2025-0075",  # unic-char-range unmaintained
    "RUSTSEC-2025-0080",  # unic-common unmaintained
    "RUSTSEC-2025-0081",  # unic-char-property unmaintained
    "RUSTSEC-2025-0098",  # unic-ucd-version unmaintained
    "RUSTSEC-2025-0100",  # unic-ucd-ident unmaintained
]

[licenses]
# CDLA-Permissive-2.0 enters via webpki-root-certs (transitive: reqwest →
# rustls-platform-verifier → webpki-root-certs). Permissive Linux-Foundation
# license used for distributing CA root cert data; safe to allow.
allow                       = ["Apache-2.0", "Apache-2.0 WITH LLVM-exception", "MIT", "MPL-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Unicode-DFS-2016", "Zlib", "CDLA-Permissive-2.0"]
confidence-threshold        = 0.9
unused-allowed-license      = "allow"

[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny              = []
