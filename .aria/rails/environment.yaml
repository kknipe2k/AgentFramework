# Environment Rails - Check system is ready

rails:
  node_installed:
    description: "Node.js must be installed"
    category: environment
    check:
      command: "node --version"
      expect_exit: 0
    applies_when:
      file_exists: "package.json"
    message: "Node.js not installed"
    fix: "Install from https://nodejs.org"

  deps_installed:
    description: "Dependencies must be installed"
    category: environment
    check:
      command: "test -d node_modules"
      expect_exit: 0
    applies_when:
      file_exists: "package.json"
    message: "Dependencies not installed"
    fix: "Run: npm install"
    auto_fix: "npm install"

  server_running:
    description: "Dev server must be running for UI checks"
    category: environment
    check:
      command: "curl -s -o /dev/null -w '%{http_code}' http://localhost:${PORT:-3000}"
      expect_output: "200"
    applies_when:
      task_type: ["feature", "ui_change"]
    message: "Server not running"
    fix: "Run: npm start (in another terminal)"
    required_before: ["verify_app_loads", "verify_e2e"]

  python_installed:
    description: "Python must be installed"
    category: environment
    check:
      command: "python3 --version"
      expect_exit: 0
    applies_when:
      file_exists: ["requirements.txt", "pyproject.toml", "setup.py"]
    message: "Python not installed"

  venv_active:
    description: "Virtual environment should be active"
    category: environment
    check:
      command: "test -n \"$VIRTUAL_ENV\""
      expect_exit: 0
    applies_when:
      file_exists: ["requirements.txt", "pyproject.toml"]
    message: "Virtual environment not active"
    fix: "Run: source venv/bin/activate"
    severity: warning

  db_connected:
    description: "Database must be accessible"
    category: environment
    check:
      command: "pg_isready -h ${DB_HOST:-localhost} -p ${DB_PORT:-5432}"
      expect_exit: 0
    applies_when:
      env_var_set: "DATABASE_URL"
      or_file_contains: ["package.json", "prisma|sequelize|typeorm|pg"]
    message: "Database not running"
    fix: "Start PostgreSQL or check DATABASE_URL"

  env_vars_set:
    description: "Required environment variables must be set"
    category: environment
    check:
      script: |
        missing=""
        for var in $(grep -hoE '\$\{?[A-Z_]+\}?' .env.example 2>/dev/null | tr -d '{}$' | sort -u); do
          if [ -z "${!var}" ]; then
            missing="$missing $var"
          fi
        done
        if [ -n "$missing" ]; then
          echo "Missing:$missing"
          exit 1
        fi
    applies_when:
      file_exists: ".env.example"
    message: "Missing required environment variables"
    fix: "Copy .env.example to .env and fill in values"
