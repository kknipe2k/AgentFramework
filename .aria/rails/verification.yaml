# Verification Rails - Ensure things actually work

rails:
  app_loads:
    description: "Application loads in browser"
    category: verification
    check:
      type: playwright
      script: |
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch();
          const page = await browser.newPage();
          await page.goto(process.env.APP_URL || 'http://localhost:3000');
          const title = await page.title();
          if (!title) throw new Error('No title - page may not have loaded');
          console.log('Page loaded: ' + title);
          await browser.close();
        })();
    applies_when:
      any_file_exists: ["package.json", "index.html"]
      task_type: ["feature", "ui_change", "bug_fix"]
    required_before: ["user_confirms", "deploy"]
    message: "App doesn't load in browser"

  e2e_tests_pass:
    description: "End-to-end tests pass"
    category: verification
    check:
      playwright: "npx playwright test"
      cypress: "npx cypress run"
      auto: "detect_e2e_and_run"
    expect_exit: 0
    applies_when:
      any_file_exists: ["playwright.config.ts", "cypress.config.js", "e2e/"]
    message: "E2E tests failing"
    blocks: ["deploy"]

  screenshot_check:
    description: "Take screenshot for visual verification"
    category: verification
    check:
      type: playwright
      script: |
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch();
          const page = await browser.newPage();
          await page.goto(process.env.APP_URL || 'http://localhost:3000');
          await page.screenshot({ path: '.aria/screenshots/latest.png', fullPage: true });
          console.log('Screenshot saved to .aria/screenshots/latest.png');
          await browser.close();
        })();
    output: ".aria/screenshots/latest.png"
    message: "Screenshot captured for review"

  user_confirms:
    description: "User manually confirms the implementation"
    category: verification
    check:
      type: user_prompt
      prompt: |
        ═══════════════════════════════════════════════════════════
                         MANUAL VERIFICATION REQUIRED
        ═══════════════════════════════════════════════════════════

        Please check the application at: {app_url}

        Changes made:
        {change_summary}

        Verify:
        - [ ] App loads without errors
        - [ ] New feature/fix works as expected
        - [ ] Nothing else appears broken

        Does everything look correct? (yes/no/describe issue):
      expect: "yes"
    required_before: ["done"]
    message: "User verification required before completing"

  api_responds:
    description: "API endpoints respond correctly"
    category: verification
    check:
      type: http
      endpoints:
        - url: "${API_URL}/health"
          method: GET
          expect_status: 200
        - url: "${API_URL}/api"
          method: GET
          expect_status: [200, 401]
    applies_when:
      file_contains: ["package.json", "express|fastify|koa|hapi"]
    message: "API not responding correctly"

  no_console_errors:
    description: "No JavaScript errors in browser console"
    category: verification
    check:
      type: playwright
      script: |
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch();
          const page = await browser.newPage();
          const errors = [];
          page.on('pageerror', err => errors.push(err.message));
          page.on('console', msg => {
            if (msg.type() === 'error') errors.push(msg.text());
          });
          await page.goto(process.env.APP_URL || 'http://localhost:3000');
          await page.waitForTimeout(2000);
          await browser.close();
          if (errors.length > 0) {
            console.error('Console errors:', errors);
            process.exit(1);
          }
        })();
    applies_when:
      task_type: ["feature", "ui_change"]
    message: "JavaScript errors in browser console"
    severity: warning

  links_work:
    description: "All links on page work"
    category: verification
    check:
      type: playwright
      script: |
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch();
          const page = await browser.newPage();
          await page.goto(process.env.APP_URL || 'http://localhost:3000');
          const links = await page.$$eval('a[href]', as => as.map(a => a.href));
          const broken = [];
          for (const link of links.slice(0, 20)) { // Check first 20
            try {
              const res = await page.goto(link);
              if (res.status() >= 400) broken.push(link);
            } catch { broken.push(link); }
          }
          await browser.close();
          if (broken.length) {
            console.error('Broken links:', broken);
            process.exit(1);
          }
        })();
    message: "Broken links detected"
    severity: warning

  mobile_responsive:
    description: "App works on mobile viewport"
    category: verification
    check:
      type: playwright
      script: |
        const { chromium, devices } = require('playwright');
        (async () => {
          const browser = await chromium.launch();
          const context = await browser.newContext({ ...devices['iPhone 12'] });
          const page = await context.newPage();
          await page.goto(process.env.APP_URL || 'http://localhost:3000');
          await page.screenshot({ path: '.aria/screenshots/mobile.png' });
          await browser.close();
          console.log('Mobile screenshot: .aria/screenshots/mobile.png');
        })();
    applies_when:
      file_contains: ["package.json", "react|vue|angular|svelte"]
    output: ".aria/screenshots/mobile.png"
    message: "Check mobile view screenshot"
