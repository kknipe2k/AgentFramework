# Safety Rails - Prevent disasters

rails:
  no_secrets:
    description: "No secrets or credentials in code"
    category: safety
    check:
      type: content_scan
      patterns:
        - "(?i)(api[_-]?key|apikey)\\s*[=:]\\s*['\"][^'\"]{10,}['\"]"
        - "(?i)(secret|password|passwd|pwd)\\s*[=:]\\s*['\"][^'\"]+['\"]"
        - "(?i)(token)\\s*[=:]\\s*['\"][A-Za-z0-9_\\-]{20,}['\"]"
        - "(?i)Bearer\\s+[A-Za-z0-9_\\-\\.]{20,}"
        - "-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----"
        - "(?i)aws[_-]?(secret|access)[_-]?key"
      files: ["**/*.js", "**/*.ts", "**/*.py", "**/*.json", "**/*.yaml", "**/*.yml"]
      exclude: ["*.example", "*.sample", "*.test.*", "*.spec.*", "node_modules/**"]
    message: "Possible secret or credential in code"
    blocks: ["commit", "push"]
    severity: critical

  no_destructive_commands:
    description: "Block dangerous commands"
    category: safety
    check:
      type: command_block
      patterns:
        - "rm -rf /"
        - "rm -rf ~"
        - "rm -rf \\*"
        - ":(){ :|:& };:"
        - "> /dev/sda"
        - "mkfs\\."
        - "dd if=.* of=/dev/"
        - "chmod -R 777 /"
        - "chown -R .* /"
    message: "Destructive command blocked"
    blocks: ["execute"]
    severity: critical

  no_force_push_main:
    description: "Never force push to main branches"
    category: safety
    check:
      type: command_block
      patterns:
        - "git push.*(--force|-f).*(main|master|production)"
        - "git push.*(main|master|production).*(--force|-f)"
    message: "Force push to protected branch blocked"
    blocks: ["execute"]

  sql_injection_check:
    description: "No raw SQL with user input"
    category: safety
    check:
      type: content_scan
      patterns:
        - "query\\(['\"].*\\$\\{.*\\}.*['\"]\\)"
        - "execute\\(['\"].*\\+.*['\"]\\)"
        - "\\$\\{.*\\}.*(?:SELECT|INSERT|UPDATE|DELETE|DROP)"
      files: ["**/*.js", "**/*.ts", "**/*.py"]
    message: "Possible SQL injection vulnerability"
    severity: warning

  backup_before_migration:
    description: "Backup database before migrations"
    category: safety
    check:
      type: pre_action
      before_commands: ["prisma migrate", "sequelize db:migrate", "alembic upgrade"]
      require:
        command: "test -f .aria/backup_confirmed"
        message: "Confirm backup exists before migration"
    message: "Create database backup before running migrations"
    prompt: "Have you backed up the database? Type 'yes' to confirm:"

  confirm_delete_operations:
    description: "Confirm before delete operations"
    category: safety
    check:
      type: command_intercept
      patterns:
        - "rm -r"
        - "git reset --hard"
        - "DROP TABLE"
        - "DELETE FROM .* WHERE 1"
    prompt: "This is a destructive operation. Are you sure? (yes/no):"
    severity: warning

  branch_protection:
    description: "Cannot push directly to protected branches"
    category: safety
    check:
      type: git_check
      protected_branches: ["main", "master", "production", "release/*"]
      allow: ["pull_request", "merge"]
    message: "Direct push to protected branch not allowed"
    blocks: ["push"]
