# Project Type Detection Rules
# Detects project type and loads appropriate rails

project_types:
  node_app:
    name: "Node.js Application"
    detect:
      file_exists: "package.json"
    rails:
      - node_installed
      - deps_installed
      - tests_pass
      - lint_clean
      - no_secrets
      - readme_exists

  node_typescript:
    name: "TypeScript Node Application"
    detect:
      file_exists: ["package.json", "tsconfig.json"]
    extends: node_app
    rails:
      - types_valid

  react_app:
    name: "React Application"
    detect:
      file_exists: "package.json"
      file_contains: ["package.json", "react"]
    extends: node_typescript
    rails:
      - server_running
      - app_loads
      - no_console_errors
      - screenshot_check
      - user_confirms

  next_app:
    name: "Next.js Application"
    detect:
      file_exists: ["package.json", "next.config.js"]
    extends: react_app
    rails:
      - build_succeeds

  express_api:
    name: "Express API"
    detect:
      file_exists: "package.json"
      file_contains: ["package.json", "express"]
    extends: node_app
    rails:
      - server_running
      - api_responds
      - no_secrets

  python_app:
    name: "Python Application"
    detect:
      any_file_exists: ["requirements.txt", "pyproject.toml", "setup.py"]
    rails:
      - python_installed
      - venv_active
      - tests_pass
      - lint_clean
      - no_secrets
      - readme_exists

  django_app:
    name: "Django Application"
    detect:
      file_exists: "manage.py"
      file_contains: ["requirements.txt", "django"]
    extends: python_app
    rails:
      - db_connected
      - server_running
      - app_loads

  static_site:
    name: "Static Website"
    detect:
      file_exists: "index.html"
      not_file_exists: "package.json"
    rails:
      - links_work
      - readme_exists

  database_project:
    name: "Database-backed Application"
    detect:
      any_condition:
        - env_var_set: "DATABASE_URL"
        - file_exists: "schema.prisma"
        - file_contains: ["package.json", "prisma|sequelize|typeorm|pg|mysql"]
    additional_rails:
      - db_connected
      - backup_before_migration
      - sql_injection_check

# Task type rail modifiers
task_types:
  feature:
    name: "New Feature"
    description: "Adding new functionality"
    cadence:
      test_every: 3
      commit_every: 5
    require_rails:
      - tests_pass
      - user_confirms
    recommended_rails:
      - e2e_tests_pass
      - changelog_updated

  bug_fix:
    name: "Bug Fix"
    description: "Fixing existing issue"
    cadence:
      test_every: 2
      commit_every: 3
    require_rails:
      - tests_pass
    recommended_rails:
      - user_confirms

  refactor:
    name: "Refactoring"
    description: "Restructuring without behavior change"
    cadence:
      test_every: 1
      commit_every: 3
    require_rails:
      - tests_pass
      - backup_before_migration
    strict_mode: true

  hotfix:
    name: "Hotfix"
    description: "Urgent production fix"
    cadence:
      test_every: 1
      commit_every: 2
    require_rails:
      - tests_pass
      - user_confirms
    skip_rails:
      - lint_clean
      - types_valid

  exploration:
    name: "Exploration"
    description: "Trying things out"
    cadence:
      test_every: 10
      commit_every: 10
    require_rails:
      - no_secrets
    relax_all: true

  deploy:
    name: "Deployment"
    description: "Shipping to production"
    require_rails:
      - build_succeeds
      - tests_pass
      - e2e_tests_pass
      - user_confirms
      - changelog_updated
    require_manual_approval: true
