name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new commit lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Always-on jobs — run regardless of whether code has landed yet
  # ────────────────────────────────────────────────────────────────────────

  schema-validate:
    name: Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jsonschema
        run: pip install --quiet jsonschema pyyaml

      - name: Validate framework JSON files
        run: |
          python <<'EOF'
          import json, jsonschema
          from pathlib import Path
          schemas_dir = Path("schemas")
          store = {}
          for f in schemas_dir.glob("*.json"):
              s = json.loads(f.read_text())
              if "$id" in s: store[s["$id"]] = s
              store[f.name] = s
          resolver = jsonschema.RefResolver(
              base_uri=f"file://{schemas_dir.resolve()}/",
              referrer=store["framework.v1.json"],
              store=store,
          )
          failed = []
          for fw in Path("examples").rglob("framework.json"):
              data = json.loads(fw.read_text())
              errors = list(jsonschema.Draft202012Validator(
                  store["framework.v1.json"], resolver=resolver
              ).iter_errors(data))
              if errors:
                  failed.append((str(fw), errors))
                  print(f"::error file={fw}::Schema validation failed ({len(errors)} errors)")
                  for e in errors[:5]:
                      print(f"  path={list(e.path)} msg={e.message[:200]}")
              else:
                  print(f"OK {fw}")
          if failed:
              raise SystemExit(1)
          EOF

      - name: Validate skill / agent / tool frontmatter
        run: |
          python <<'EOF'
          import json, jsonschema, re
          import yaml
          from pathlib import Path

          def parse_frontmatter(path):
              text = Path(path).read_text()
              m = re.match(r'^---\n(.*?)\n---', text, re.DOTALL)
              return yaml.safe_load(m.group(1)) if m else None

          schemas_dir = Path("schemas")
          store = {}
          for f in schemas_dir.glob("*.json"):
              s = json.loads(f.read_text())
              if "$id" in s: store[s["$id"]] = s
              store[f.name] = s
          resolver = jsonschema.RefResolver(
              base_uri=f"file://{schemas_dir.resolve()}/",
              referrer=store["framework.v1.json"],
              store=store,
          )
          checks = [
              ("examples/*/skills/*.md", "skill.v1.json"),
              ("examples/*/agents/*.md", "agent.v1.json"),
              ("examples/*/tools/*.md",  "tool.v1.json"),
          ]
          failed = 0
          for glob, schema_name in checks:
              for f in sorted(Path(".").glob(glob)):
                  fm = parse_frontmatter(f)
                  if fm is None:
                      print(f"::warning file={f}::No frontmatter found")
                      continue
                  errors = list(jsonschema.Draft202012Validator(
                      store[schema_name], resolver=resolver
                  ).iter_errors(fm))
                  if errors:
                      failed += 1
                      print(f"::error file={f}::Frontmatter validation failed ({len(errors)} errors)")
                      for e in errors[:5]:
                          print(f"  path={list(e.path)} msg={e.message[:200]}")
                  else:
                      print(f"OK {f}")
          if failed: raise SystemExit(1)
          EOF

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            *.md
            docs/**/*.md
            examples/**/*.md
            !**/node_modules/**
        continue-on-error: true   # advisory until we tune the ruleset

  spec-link-check:
    name: Spec link check (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for broken markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: '--verbose --no-progress --max-concurrency 4 ''**/*.md'''
          fail: false   # advisory; tighten once links are stable
        continue-on-error: true

  stage-prompts-validate:
    name: Stage-prompt schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate stage-prompt XML schemas
        run: node bin/validate-stage-prompts.mjs

  # ────────────────────────────────────────────────────────────────────────
  # Code jobs — gated on Cargo workspace existing.
  # These activate at M1 (Foundation) when crates/ lands.
  # ────────────────────────────────────────────────────────────────────────

  detect-cargo:
    name: Detect Cargo workspace
    runs-on: ubuntu-latest
    outputs:
      has_cargo:    ${{ steps.check.outputs.has_cargo }}
      has_npm:      ${{ steps.check.outputs.has_npm }}
      code_changed: ${{ steps.changed.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ -f "Cargo.toml" ]; then
            echo "has_cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cargo=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f "package.json" ] && [ -f "package-lock.json" ]; then
            echo "has_npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_npm=false" >> "$GITHUB_OUTPUT"
          fi
      # Docs-only short-circuit. The heavy code jobs (rust, cargo-audit,
      # cargo-deny, fuzz-smoke, coverage, frontend, e2e) additionally
      # gate on `code_changed`. A change touching ONLY docs/** or a
      # root-level *.md skips them — there is no code to gate. A skipped
      # job reports "success", so a docs-only PR stays mergeable even
      # when these are required status checks (GitHub treats a skipped
      # required check as passing). Anything outside docs/** + root *.md
      # — schemas/, examples/, .github/, crates/, src/, src-tauri/,
      # tests/, Cargo.*, package*.json, bin/ — runs the full suite. The
      # always-on jobs (schema-validate, markdown-lint, spec-link-check,
      # stage-prompts-validate, gap-analysis-append-only) run regardless.
      # Fail-safe: if the diff cannot be computed, code_changed=true.
      - id: changed
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD")
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            if [ "$before" != "0000000000000000000000000000000000000000" ] \
               && git cat-file -e "$before" 2>/dev/null; then
              files=$(git diff --name-only "$before" HEAD)
            else
              files=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            fi
          else
            files=""
          fi
          echo "Changed files:"
          echo "$files"
          code_changed=true
          if [ -n "$files" ]; then
            non_docs=$(echo "$files" | grep -vE '^docs/|^[^/]+\.md$' || true)
            if [ -z "$non_docs" ]; then
              code_changed=false
            fi
          fi
          echo "code_changed=$code_changed" >> "$GITHUB_OUTPUT"
          echo "Result: code_changed=$code_changed"

  rust:
    name: Rust ${{ matrix.os }} / ${{ matrix.toolchain }}
    needs: detect-cargo
    if: needs.detect-cargo.outputs.has_cargo == 'true' && needs.detect-cargo.outputs.code_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable]
        include:
          - os: ubuntu-latest
            toolchain: '1.80'   # MSRV
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - name: Install Tauri Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libseccomp-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # NOTE: deliberately NOT --all-features. The `integration` feature on
      # runtime-main gates `tests/anthropic_smoke.rs` behind a real-API
      # smoke test that requires an Anthropic API key in the OS keychain
      # (per spec §M2 acceptance + CLAUDE.md §13 zero-telemetry).
      # `--all-features` would un-gate it and CI would panic on missing key.
      # Real-API smoke runs only as a manual `cargo test --features integration`.
      #
      # `--features runtime-mcp/test-helpers` is REQUIRED (M06.C): the
      # MCP client lifecycle contract tests live in
      # `crates/runtime-mcp/tests/client_lifecycle.rs` behind
      # `#![cfg(feature = "test-helpers")]` (they drive the in-process
      # MockTransport). Without the feature, `cargo test --workspace`
      # silently skips them — the gotcha #66 "tests-pass-but-contract-
      # fails" failure mode the M06.C strict-TDD red phase guards against.
      - run: cargo test --workspace --features runtime-mcp/test-helpers
      - name: Type generation drift check
        run: cargo xtask regenerate-types --check
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: '-D missing_docs -D rustdoc::broken_intra_doc_links'

  cargo-audit:
    name: cargo audit
    needs: detect-cargo
    if: needs.detect-cargo.outputs.has_cargo == 'true' && needs.detect-cargo.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      # Advisory ignores: cargo-audit reads ~/.cargo/audit.toml by
      # default and does NOT pick up a workspace-root audit.toml — so
      # the ignore list is passed via --ignore flags here. Mirrors
      # deny.toml's [advisories].ignore for the gtk-rs 0.18.x stack
      # (Tauri 2.x transitive deps on Linux) plus the unic-* family
      # plus the glib VariantStrIter unsoundness (we don't call it).
      # All entries are warning-level (unmaintained / unsound-but-
      # unused), not exploitable vulns.
      - name: cargo audit (with workspace-policy advisory ignores)
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2024-0411 \
            --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2024-0414 \
            --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 \
            --ignore RUSTSEC-2024-0417 \
            --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 \
            --ignore RUSTSEC-2024-0420 \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2025-0075 \
            --ignore RUSTSEC-2025-0080 \
            --ignore RUSTSEC-2025-0081 \
            --ignore RUSTSEC-2025-0098 \
            --ignore RUSTSEC-2025-0100

  cargo-deny:
    name: cargo deny
    needs: detect-cargo
    if: needs.detect-cargo.outputs.has_cargo == 'true' && needs.detect-cargo.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  fuzz-smoke:
    name: Fuzz smoke (30s)
    needs: detect-cargo
    if: needs.detect-cargo.outputs.has_cargo == 'true' && needs.detect-cargo.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      - run: cargo +nightly fuzz run drone_command_decode -- -max_total_time=30
        working-directory: crates/runtime-drone

  gap-analysis-append-only:
    name: gap-analysis.md append-only check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify prior content is unchanged
        run: |
          set -euo pipefail
          BASE_REF="${{ github.event.pull_request.base.ref || 'main' }}"
          git fetch origin "$BASE_REF":"$BASE_REF" 2>/dev/null || git fetch origin "$BASE_REF"
          if git show "$BASE_REF":docs/gap-analysis.md > /tmp/gap-base.md 2>/dev/null; then
            base_lines=$(wc -l < /tmp/gap-base.md)
            if [ "$base_lines" -gt 0 ]; then
              if ! diff -q /tmp/gap-base.md <(head -n "$base_lines" docs/gap-analysis.md) > /dev/null; then
                echo "::error::docs/gap-analysis.md is append-only per CLAUDE.md §20."
                echo "Prior content was modified or deleted. Diff:"
                diff /tmp/gap-base.md <(head -n "$base_lines" docs/gap-analysis.md) || true
                exit 1
              fi
            fi
          fi
          echo "Append-only invariant holds."

  coverage:
    name: Coverage (Rust)
    needs: detect-cargo
    if: needs.detect-cargo.outputs.has_cargo == 'true' && needs.detect-cargo.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libseccomp-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-llvm-cov --locked
      # Workspace gate — generated code + binary stubs excluded.
      # Per CLAUDE.md §5 + §6 + M01-foundation.md Stage D §D.3.
      - name: Workspace coverage (≥80%)
        run: |
          cargo llvm-cov --workspace \
            --ignore-filename-regex "src.main\.rs|generated" \
            --fail-under-lines 80
      # Drone safety-primitive gate — additionally exclude OS-signal
      # orchestrators (lib.rs + shutdown.rs) which are exercised by the
      # Unix subprocess integration test in tests/integration.rs.
      - name: Drone coverage (≥95%, OS-signal entry points excluded)
        run: |
          cargo llvm-cov --package runtime-drone \
            --ignore-filename-regex "src.main\.rs|generated|src.lib\.rs|src.shutdown\.rs" \
            --fail-under-lines 95
      # runtime-main safety-primitive gate — additionally exclude
      # (a) providers/anthropic.rs (real-network reqwest+SSE wrapper;
      # Stage C exclusion), (b) drone_ipc/connection.rs (cfg-platform
      # open() OS-call wrapper; Stage D exclusion), and (c) key_store.rs
      # (OS-keychain wrapper via the `keyring` crate; Stage E exclusion —
      # the round-trip + missing-entry tests are #[ignore]-gated because
      # they require a real OS keychain at runtime, not available on CI
      # Linux runners). All three are the OS-signal-class holdouts for
      # the runtime-main safety primitive.
      # Testable seams Connection::send_with_reconnect +
      # Connection::from_streams are exercised by unit tests
      # (tokio::io::duplex) plus the loopback integration test
      # (tests/drone_ipc_loopback.rs spawning the M01 drone subprocess).
      # Per CLAUDE.md §5 + M02-event-pipeline.md Stages C/D/E.
      - name: runtime-main coverage (≥95%, OS-call holdouts excluded)
        run: |
          cargo llvm-cov --package runtime-main \
            --ignore-filename-regex "src.main\.rs|generated|src.providers.anthropic\.rs|src.drone_ipc.connection\.rs|src.sandbox_ipc.connection\.rs|src.import.fetch\.rs" \
            --fail-under-lines 95
      # runtime-sandbox safety-primitive gate (M05 Stage C2 lifted ipc.rs
      # into the gate per the C1 carry-forward; OS-isolation files
      # seccomp.rs / landlock.rs are now in scope on Linux). The only
      # exclusion that remains is src/lib.rs — the run/run_inner
      # OS-signal orchestrator wrapping the testable seam (parallel to
      # drone's lib.rs + shutdown.rs exclusion). The cfg-platform
      # accept-loop wrapper in src/ipc.rs has its tests via the
      # subprocess integration test in tests/integration.rs; coverage
      # is measured on Linux CI where the binary builds with the
      # libseccomp + landlock deps. job_objects.rs builds only on
      # Windows, so its line coverage is contributed by the Windows
      # CI matrix; per-crate fail-under-lines on Linux therefore
      # excludes job_objects.rs via the cfg-platform compile-out.
      # Per CLAUDE.md §5 + M05-gap-capability.md C2.4.
      - name: runtime-sandbox coverage (≥95%)
        # Excludes (a) main.rs (binary stub), (b) lib.rs (run wrapping
        # run_inner with the OS-signal future), (c) seccomp.rs +
        # landlock.rs (`cfg(target_os = "linux")` modules whose
        # `install()` functions install OS fences on the calling process
        # — structurally untestable from in-process unit tests; parallel
        # to drone's lib.rs + shutdown.rs OS-signal-class exclusion).
        # Coverage credit for seccomp + landlock comes from the
        # subprocess integration tests in `tests/integration.rs` which
        # verify isolation is active via `/proc/$pid/status`; that
        # surface is structurally not a per-line coverage gate but a
        # behavioral one. M05 PR #70 post-merge carry-forward: seam
        # decomposition (`install_with(load_fn)` / `install_with(restrict_fn)`)
        # would lift these modules back into the gate.
        run: |
          cargo llvm-cov --package runtime-sandbox \
            --ignore-filename-regex "src.main\.rs|generated|src.lib\.rs|src.seccomp\.rs|src.landlock\.rs" \
            --fail-under-lines 95
      # runtime-mcp safety-primitive gate (M06 Stage B + Stage C).
      # Excludes (a) main.rs not applicable (no binary), (b) lib.rs
      # (pub-mod declarations + re-exports — parallel to
      # runtime-sandbox lib.rs exclusion), (c) transport/stdio.rs +
      # transport/http.rs (rmcp wrapper modules whose `connect()` happy
      # paths require a real MCP-protocol-compliant peer — OS-call
      # holdouts parallel to runtime-main providers/anthropic.rs),
      # (d) M06.C client/auth_keyring.rs (KeyringSecretStore wraps the
      # `keyring` crate — every method touches the real OS keychain;
      # structurally untestable on CI cells without a session bus /
      # signed-in user; parallel to runtime-main key_store.rs +
      # the M02.C anthropic.rs precedent), (e) M06.C client/lifecycle.rs
      # (spawn_health_pinger is a tokio::spawn'd infinite loop; the loop
      # body delegates to McpClient::run_health_pass which IS in-gate;
      # the spawn wrapper is parallel to drone's lib.rs run() exclusion).
      # In-gate at ≥95%: client/{mod,registry,auth,error}.rs +
      # transport/{mod,mock}.rs + error.rs. The `--features
      # test-helpers` flag is REQUIRED — M06.C's client_lifecycle.rs
      # integration tests are `#![cfg(feature = "test-helpers")]`-gated
      # and exercise the McpClient surface (without the feature, client/
      # coverage craters). Per CLAUDE.md §5 + M06-mcp-basic.md Stage B/C.
      - name: runtime-mcp coverage (≥95%, OS-call holdouts excluded)
        run: |
          cargo llvm-cov --package runtime-mcp --features test-helpers \
            --ignore-filename-regex "src.main\.rs|generated|src.lib\.rs|src.transport.stdio\.rs|src.transport.http\.rs|src.client.auth_keyring\.rs|src.client.lifecycle\.rs" \
            --fail-under-lines 95
      # lcov export for Codecov — workspace + per-crate uploads. The
      # cargo-llvm-cov --fail-under-lines gates above remain authoritative
      # for absolute floors. Codecov gates the *delta* vs main per
      # codecov.yml (project: 0.5pp, patch: ≥80% on touched lines).
      # Per-crate flag uploads let codecov.yml's `runtime-drone` /
      # `runtime-main` per-flag targets enforce 95% absolute coverage.
      - name: Generate workspace lcov
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex "src.main\.rs|generated"
      - name: Generate runtime-drone lcov
        run: |
          cargo llvm-cov --package runtime-drone --lcov \
            --output-path lcov-drone.info \
            --ignore-filename-regex "src.main\.rs|generated|src.lib\.rs|src.shutdown\.rs"
      - name: Generate runtime-main lcov
        run: |
          cargo llvm-cov --package runtime-main --lcov \
            --output-path lcov-main.info \
            --ignore-filename-regex "src.main\.rs|generated|src.providers.anthropic\.rs|src.drone_ipc.connection\.rs|src.sandbox_ipc.connection\.rs|src.import.fetch\.rs"
      - name: Generate runtime-sandbox lcov
        run: |
          cargo llvm-cov --package runtime-sandbox --lcov \
            --output-path lcov-sandbox.info \
            --ignore-filename-regex "src.main\.rs|generated|src.lib\.rs|src.seccomp\.rs|src.landlock\.rs"
      - name: Generate runtime-mcp lcov
        run: |
          cargo llvm-cov --package runtime-mcp --features test-helpers --lcov \
            --output-path lcov-mcp.info \
            --ignore-filename-regex "src.main\.rs|generated|src.lib\.rs|src.transport.stdio\.rs|src.transport.http\.rs|src.client.auth_keyring\.rs|src.client.lifecycle\.rs"
      # Codecov uploads — required from M02 onward (per CLAUDE.md §5
      # "Coverage delta gating (from M02 onward) — Codecov-enforced").
      # The codecov.yml `informational: false` flags make Codecov status
      # checks blocking; this CI step's `fail_ci_if_error` ensures upload
      # failures themselves also red the build.
      - name: Upload workspace coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files:            lcov.info
          flags:            workspace
          fail_ci_if_error: true
          token:            ${{ secrets.CODECOV_TOKEN }}
      - name: Upload runtime-drone coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files:            lcov-drone.info
          flags:            runtime-drone
          fail_ci_if_error: true
          token:            ${{ secrets.CODECOV_TOKEN }}
      - name: Upload runtime-main coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files:            lcov-main.info
          flags:            runtime-main
          fail_ci_if_error: true
          token:            ${{ secrets.CODECOV_TOKEN }}
      - name: Upload runtime-sandbox coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files:            lcov-sandbox.info
          flags:            runtime-sandbox
          fail_ci_if_error: true
          token:            ${{ secrets.CODECOV_TOKEN }}
      - name: Upload runtime-mcp coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files:            lcov-mcp.info
          flags:            runtime-mcp
          fail_ci_if_error: true
          token:            ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Frontend (TypeScript)
    needs: detect-cargo
    if: needs.detect-cargo.outputs.has_npm == 'true' && needs.detect-cargo.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      # Markdown / YAML / YAML excluded from prettier via .prettierignore —
      # repo-wide markdown predates Stage E and is checked by the existing
      # markdown-lint job; YAML is checked structurally by GitHub Actions
      # itself. Stage E adds prettier coverage for the JS/TS/JSON surface.
      - run: npx prettier --check '**/*.{ts,tsx,js,jsx,json}'
      - run: npx eslint .
      - run: npx tsc --noEmit
      - run: npm run test

  e2e:
    name: E2E (Playwright renderer)
    needs: [detect-cargo, frontend]
    if: needs.detect-cargo.outputs.has_npm == 'true' && needs.detect-cargo.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Renderer-level Playwright tests against the Vite dev server with
      # @tauri-apps/api shimmed inside the page. Complements the desktop-shell
      # E2E job below (tauri-driver + WebdriverIO) — different layer, faster
      # feedback. Both must pass for M03+.
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────
  # Real-app regression gate (ADR-0021). Drives the built Tauri binary via
  # `tauri-driver` + WebdriverIO on Linux + Windows — the only gate that
  # exercises the real desktop window. The Playwright `e2e` job above mocks
  # `@tauri-apps/api` in a plain Chromium and is structurally blind to
  # Tauri-shell behavior (native drag-drop, WebView2 events, the real
  # window). macOS is excluded — `tauri-driver` has no WKWebView driver
  # (gotcha #23); macOS renderer logic is covered by the Playwright `e2e`
  # job. A failure blocks the workflow — the same standing as `e2e`.
  #
  # Revived at M08.5 Stage A.fix after being `if: false` since M03 PR #47.
  # The M03 disable was diagnosed (grep-verified) to two concrete config
  # bugs, NOT a wdio/tauri-driver version incompatibility: (1) the app
  # binary path — `src-tauri` is a Cargo workspace member so the binary is
  # emitted to the workspace-root `target/`, not `src-tauri/target/`
  # (fixed in `wdio.conf.ts`); (2) no Windows msedgedriver setup (fixed by
  # the `msedgedriver-tool` step below).
  # ────────────────────────────────────────────────────────────────────────
  e2e-tauri-driver:
    name: E2E (Tauri-driver desktop shell)
    needs: [detect-cargo, frontend]
    if: needs.detect-cargo.outputs.has_cargo == 'true' && needs.detect-cargo.outputs.has_npm == 'true' && needs.detect-cargo.outputs.code_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest skipped — tauri-driver does not support macOS per
        # https://v2.tauri.app/develop/tests/webdriver/. Renderer-level
        # Playwright tests cover macOS via the existing `e2e` job.
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri Linux system deps + WebKitGTK driver + Xvfb
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            webkit2gtk-driver \
            xvfb \
            build-essential \
            curl \
            wget \
            file
      # Windows: tauri-driver proxies WebDriver requests to msedgedriver,
      # which must be on PATH and version-matched to the runner's Edge
      # WebView2. The M03 disable's Windows failure was exactly this —
      # msedgedriver absent from PATH, so tauri-driver fell back to
      # treating the app binary as the Edge executable. msedgedriver-tool
      # downloads the version-matched driver. The `run:` block is quoted
      # verbatim from the official Tauri WebDriver CI reference (gotcha
      # #32): tauri-apps/tauri-docs @ a9d8348ff518e4a052bcd7435c07e34a9dfe1af1,
      # src/content/docs/develop/Tests/WebDriver/ci.md.
      - name: Install msedgedriver (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $PWD.Path >> $env:GITHUB_PATH
      - run: npm ci
      # tauri-driver is the WebDriver bridge for Tauri 2.x apps. The npm
      # package distributes prebuilt binaries; the cargo binary is the older
      # path. Install globally so it lands on PATH for `wdio.conf.ts`'s
      # `spawn('tauri-driver', ...)`.
      - name: Install tauri-driver
        run: cargo install tauri-driver --locked
      - name: Build Tauri app (release mode)
        run: npx tauri build --no-bundle
        env:
          # The smoke test (test 3 in tests/e2e-tauri/smoke.e2e.ts) calls
          # the Anthropic API; ANTHROPIC_TEST_KEY is a low-budget repo
          # secret (~$0.001 per CI run × 2 OS = ~$0.002 per PR run).
          # When the secret is unset, the build proceeds; the test will
          # fail with a clear message about the missing key in keychain.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_TEST_KEY }}
      # Linux WebKitGTK requires a display server; xvfb provides a virtual
      # one. Windows uses the real desktop on the runner (msedgedriver +
      # Edge WebView2 are pre-installed on windows-latest).
      - name: Run Tauri-driver E2E (Linux with Xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum npm run test:e2e:tauri
      - name: Run Tauri-driver E2E (Windows native)
        if: matrix.os == 'windows-latest'
        run: npm run test:e2e:tauri
